<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EPUB JS Reader</title>
    <!-- Include jszip -->
    <script src="jszip.min.js"></script>
    <!-- Include epub.js -->
    <script src="epub.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f9f9f9; }
        #viewer { width: 100vw; height: 100vh; overflow: hidden; }
        #controls { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 10px; z-index: 100; pointer-events: none; }
        .nav-btn { pointer-events: auto; padding: 6px 10px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 4px; font-size: 12px; min-width: 60px; margin: 0 2px; cursor: pointer; }
        .center-controls { display: flex; pointer-events: auto; }
        #toc-btn { pointer-events: auto; position: absolute; top: 10px; right: 10px; padding: 6px 10px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 4px; font-size: 12px; z-index: 100; cursor: pointer;}
        #toc-menu { position: absolute; top: 50px; right: 10px; width: 250px; max-height: 80vh; overflow-y: auto; background: white; border: 1px solid #ccc; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; z-index: 200; }
        .toc-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; color: #333; font-family: sans-serif; font-size: 14px; }
        .toc-item:active { background: #f0f0f0; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; color: #666; font-size: 18px; z-index: 50; }
    </style>
</head>
<body>
    <div id="loading">Loading Book...</div>
    <div id="viewer"></div>
    <button id="toc-btn" onclick="toggleToc()">Table of Contents</button>
    <div id="toc-menu"></div>
    <div id="controls">
        <button id="prev" class="nav-btn" onclick="rendition.prev()">Prev</button>
        <div class="center-controls">
            <button class="nav-btn" onclick="bookmarkCurrentPage()">Bookmark</button>
            <button class="nav-btn" onclick="toggleScrollMode()">Toggle View</button>
        </div>
        <button id="next" class="nav-btn" onclick="rendition.next()">Next</button>
    </div>

    <script>
        var book = null;
        var rendition = null;
        var tocMenu = document.getElementById("toc-menu");
        var isContinuous = false;

        function toggleToc() {
            tocMenu.style.display = (tocMenu.style.display === 'block') ? 'none' : 'block';
        }

        function bookmarkCurrentPage() {
            if (rendition && typeof Android !== "undefined") {
                var currentLocation = rendition.currentLocation();
                if (currentLocation && currentLocation.start) {
                    Android.saveBookmark(currentLocation.start.cfi);
                } else {
                    console.log("Location not ready yet");
                }
            }
        }

        function toggleScrollMode() {
            if (!rendition) return;
            var loc = rendition.currentLocation();
            var cfi = (loc && loc.start) ? loc.start.cfi : null;
            
            isContinuous = !isContinuous;
            rendition.destroy();
            
            var options = isContinuous ? {
                manager: "continuous",
                flow: "scrolled",
                width: "100%",
                height: "100%"
            } : {
                width: "100%",
                height: "100%",
                spread: "none"
            };
            
            rendition = book.renderTo("viewer", options);
            if (cfi) {
                rendition.display(cfi);
            } else {
                rendition.display();
            }
        }

        // Called from Android with the Base64 EPUB content and optional CFI
        function loadEpubFromBase64(base64Data, bookmarkCfi) {
            console.log("Loading epub, length: " + base64Data.length);
            var binary_string = window.atob(base64Data);
            var len = binary_string.length;
            var bytes = new Uint8Array(len);
            for (var i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            var arrayBuffer = bytes.buffer;

            book = ePub(arrayBuffer);
            rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                spread: "none"
            });
            
            if (bookmarkCfi) {
                rendition.display(bookmarkCfi);
            } else {
                rendition.display();
            }

            book.ready.then(function() {
                document.getElementById('loading').style.display = 'none';
                return book.locations.generate(1600); // Generate locations for accurate nav
            });

            // Parse Table of Contents and populate the menu
            book.loaded.navigation.then(function(toc) {
                toc.forEach(function(chapter) {
                    var div = document.createElement("div");
                    div.className = "toc-item";
                    div.textContent = chapter.label;
                    div.onclick = function() {
                        rendition.display(chapter.href);
                        toggleToc();
                    };
                    tocMenu.appendChild(div);
                });
            });

            // Keyboard navigation
            document.addEventListener("keyup", function(e) {
                if(e.keyCode == 37) { rendition.prev(); }
                if(e.keyCode == 39) { rendition.next(); }
            });
        }
    </script>
</body>
</html>
